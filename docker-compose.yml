version: "3.8"

services:
  db:
    build:
      context: ./sqlfiles
      dockerfile: DockerfileSql
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_ADMIN_EMAIL=${MYSQL_ADMIN_EMAIL}
      - MYSQL_ADMIN_PASSWORD=${MYSQL_ADMIN_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
      - ./sqlfiles:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "127.0.0.1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s


  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:8080/ || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s


  server:
    build:
      context: ./server
      dockerfile: DockerfilePython
    restart: always
    ports:
      - "8000:8000"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_HOST=${MYSQL_HOST}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  react:
    image: react
    build:
      context: .
      dockerfile: DockerfileReact
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_SERVER_URL=${REACT_APP_SERVER_URL}
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost/ || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s


volumes:
  db-data:

networks:
  default:
    driver: bridge